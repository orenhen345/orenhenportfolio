<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <title>Home — mobile shift preview (100px)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      background: #0b0f14;
      color: #c5d4e0;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
    }
    .preview-banner {
      padding: 14px 16px;
      text-align: center;
      font-size: 0.9rem;
      line-height: 1.5;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      max-width: 520px;
      margin: 0 auto;
    }
    .preview-banner strong {
      color: #e8f4ff;
    }
    .preview-banner code {
      font-size: 0.82em;
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 6px;
      border-radius: 4px;
    }
    .frame-wrap {
      max-width: 430px;
      margin: 0 auto;
      min-height: calc(100vh - 120px);
    }
    iframe {
      width: 100%;
      height: calc(100vh - 120px);
      min-height: 560px;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <div class="preview-banner">
    <strong>Preview frame</strong> — narrow viewport to see the same mobile layout as <code>index.html</code> (WELCOME + cards shifted <strong>100px</strong> down on max-width 900px).
  </div>
  <div class="frame-wrap">
    <iframe src="index.html" title="Home preview — mobile layout"></iframe>
  </div>
</body>
</html>
