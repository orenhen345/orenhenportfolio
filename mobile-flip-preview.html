<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Flip Message Preview</title>
  <style>
    @font-face {
      font-family: "AhronBold";
      src: url("my_web/FONTS/welcome/ahronbd.ttf") format("truetype");
      font-display: swap;
    }

    @font-face {
      font-family: "Showg";
      src: url("my_web/FONTS/welcome/SHOWG.TTF") format("truetype");
      font-display: swap;
    }

    @font-face {
      font-family: "Coopbl";
      src: url("my_web/FONTS/welcome/COOPBL.TTF") format("truetype");
      font-display: swap;
    }

    @font-face {
      font-family: "Latinwd";
      src: url("my_web/FONTS/welcome/LATINWD.TTF") format("truetype");
      font-display: swap;
    }

    :root {
      --text-color: #0F1C26;
      --panel-bg: rgba(255, 255, 255, 0.36);
      --panel-border: rgba(255, 255, 255, 0.52);
      --mini-rect: #cdd8ef;
      --mini-rect-border: #99accf;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, #2f446f 0%, transparent 45%),
        radial-gradient(circle at 78% 78%, #2a3f68 0%, transparent 48%),
        linear-gradient(160deg, #1f3359, #152848 70%);
      padding: 24px;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    .preview-stage {
      width: min(92vw, 420px);
      min-height: 65vh;
      display: grid;
      place-items: center;
      position: relative;
    }

    .mobile-flip-overlay {
      width: 100%;
      border-radius: 28px;
      padding: 26px 22px 24px;
      background: var(--panel-bg);
      border: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      text-align: center;
      color: var(--text-color);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.25);
      animation: overlay-life 5.5s forwards;
    }

    .line-1 {
      margin: 0;
      font-family: "AhronBold", Arial, sans-serif;
      font-size: clamp(1.02rem, 4.4vw, 1.45rem);
      line-height: 1.25;
      letter-spacing: 0.01em;
    }

    .line-2 {
      margin: 8px 0 0;
      font-family: "Showg", Arial, sans-serif;
      font-size: clamp(1.4rem, 6.2vw, 1.9rem);
      line-height: 1.08;
      letter-spacing: 0.01em;
    }

    .phone-demo {
      width: clamp(52px, 14vw, 68px);
      aspect-ratio: 9 / 16;
      margin: 16px auto 0;
      border-radius: 10px;
      background: linear-gradient(160deg, var(--mini-rect), #b8c7e7);
      border: 2px solid var(--mini-rect-border);
      box-shadow: 0 6px 16px rgba(16, 42, 84, 0.24);
      transform-origin: center;
      animation: phone-tilt 1.8s ease-in-out infinite;
      position: relative;
    }

    .phone-demo::before {
      content: "";
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 36%;
      height: 2px;
      border-radius: 2px;
      background: rgba(16, 42, 84, 0.5);
    }

    .turntable-toggle {
      margin: 14px auto 0;
      width: 58px;
      height: 58px;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      position: relative;
      display: grid;
      place-items: center;
    }

    .turntable-icon {
      width: 100%;
      height: 100%;
      display: block;
    }

    .turntable-x {
      position: absolute;
      width: 82%;
      height: 82%;
      pointer-events: none;
      transition: opacity 220ms ease;
      animation: cta-pulse 1.15s ease-in-out infinite;
    }

    .turntable-x::before,
    .turntable-x::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 86%;
      height: 4px;
      border-radius: 999px;
      background: #D8172F;
      transform-origin: center;
    }

    .turntable-x::before {
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .turntable-x::after {
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    .turntable-toggle.is-on .turntable-x {
      opacity: 0;
      animation: none;
    }

    .turntable-toggle.is-on .turntable-icon {
      animation: spin-disc 2.2s linear infinite;
      transform-origin: 50% 50%;
    }

    .sound-note {
      margin: 8px 0 0;
      font-size: 0.84rem;
      font-weight: 600;
      color: #0F1C26;
      opacity: 0.9;
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.9rem;
    }

    @keyframes phone-tilt {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(90deg); }
    }

    @keyframes spin-disc {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes cta-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.18); }
    }

    /* Show 6s, then fade out for 1.5s */
    @keyframes overlay-life {
      0%, 80% {
        opacity: 1;
        transform: translateY(0);
      }
      100% {
        opacity: 0;
        transform: translateY(10px);
      }
    }
  </style>
</head>
<body>
  <div class="preview-stage">
    <div class="mobile-flip-overlay" role="status" aria-live="polite">
      <p class="line-1">I recommend to flip the phone</p>
      <p class="line-2">Welcome to my world</p>
      <div class="phone-demo" aria-hidden="true"></div>
      <button class="turntable-toggle" id="turntableToggle" type="button" aria-label="Enable sound">
        <svg class="turntable-icon" viewBox="0 0 64 64" aria-hidden="true">
          <defs>
            <radialGradient id="discGrad" cx="48%" cy="42%" r="62%">
              <stop offset="0%" stop-color="#2E3B4F" />
              <stop offset="62%" stop-color="#18263A" />
              <stop offset="100%" stop-color="#111B2A" />
            </radialGradient>
          </defs>
          <circle cx="32" cy="32" r="30" fill="url(#discGrad)" />
          <circle cx="32" cy="32" r="23.5" fill="none" stroke="#4B5B73" stroke-width="1.8" opacity="0.92" />
          <circle cx="32" cy="32" r="18.5" fill="none" stroke="#4B5B73" stroke-width="1.7" opacity="0.88" />
          <circle cx="32" cy="32" r="13.5" fill="none" stroke="#4B5B73" stroke-width="1.6" opacity="0.85" />
          <circle cx="32" cy="32" r="8.5" fill="#F25C73" />
          <circle cx="32" cy="32" r="2.4" fill="#0F1C26" />
          <ellipse cx="28.2" cy="26.6" rx="8.2" ry="4.4" fill="#6B7C95" opacity="0.22" />
        </svg>
        <span class="turntable-x" aria-hidden="true"></span>
      </button>
      <p class="sound-note" id="soundNote">Tap to enable project video sound after message fades</p>
    </div>
  </div>

  <div class="hint">Preview only (not active on site yet)</div>
  <script>
    (function () {
      var toggle = document.getElementById("turntableToggle");
      var soundNote = document.getElementById("soundNote");
      var soundEnabled = false;

      toggle.addEventListener("click", function () {
        soundEnabled = !soundEnabled;
        toggle.classList.toggle("is-on", soundEnabled);
        toggle.setAttribute("aria-label", soundEnabled ? "Sound enabled" : "Enable sound");
        soundNote.textContent = soundEnabled
          ? "Sound is armed: will start after the message disappears"
          : "Tap to enable project video sound after message fades";
      });

      // 6s visible + 1.5s fade = 7.5s
      setTimeout(function () {
        if (soundEnabled) {
          soundNote.textContent = "Preview: home project video sound is ON";
        }
      }, 7500);
    })();
  </script>
</body>
</html>
